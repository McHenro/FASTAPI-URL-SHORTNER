[alembic]
# Where env.py and the versions/ folder live
script_location = alembic

# Adds the project root to Python's path so "from app.xxx" imports work inside env.py
prepend_sys_path = .

# Use the OS path separator (/ on Mac/Linux)
version_path_separator = os

# Intentionally blank — env.py reads DATABASE_URL from .env and injects it at runtime
sqlalchemy.url =

[post_write_hooks]

# --- Logging config (controls the INFO lines you see when running alembic commands) ---

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

# Alembic's own logger — set to INFO so migration progress is visible
[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
